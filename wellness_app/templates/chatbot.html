{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>AroMi Chatbot</title>
    <link rel="stylesheet" href="{% static 'css/chatbot.css' %}?v=10">
</head>
<body>

<div class="chat-container">
    <h2>AroMi AI Health Chatbot</h2>

    <div class="chat-box" id="chat-box">
        <p class="bot">👋 Hello! Ask me anything about your health.</p>
    </div>

    <form id="chat-form">
        {% csrf_token %}
        <input type="text" id="user-input" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>
</div>

<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const chatBox = document.getElementById("chat-box");

// Function to get CSRF token
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    let message = input.value;

    // Show user message
    chatBox.innerHTML += `<p class="user">You: ${message}</p>`;

    fetch('/chatbot-response/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {
        chatBox.innerHTML += `<p class="bot">Bot: ${data.response}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    input.value = "";
});
</script>

</body>
</html>
